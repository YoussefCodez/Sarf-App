name: finance_tracking
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  cupertino_icons: ^1.0.8
  dotted_border: ^3.1.0
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_riverpod: ^3.3.1
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.4
  gap: ^3.0.1
  go_router: ^17.2.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/svgs/
  fonts:
    - family: Main
      fonts:
        - asset: assets/fonts/PlusJakartaSans-VariableFont_wght.ttf
